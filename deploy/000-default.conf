<VirtualHost *:${PORT}>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block direct access to internal folders and sensitive file types
    <DirectoryMatch "^/var/www/html/(includes|logs|database|tests|deploy)">
        Require all denied
    </DirectoryMatch>
    <FilesMatch "\.(sql|log|md|ini|dockerfile)$">
        Require all denied
    </FilesMatch>
    # Block Dockerfile by exact name (no extension on Linux — FilesMatch regex above misses it)
    <Files "Dockerfile">
        Require all denied
    </Files>

    # ── Gzip compression (60-70% reduction on HTML/CSS/JS/JSON responses) ──
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css
        AddOutputFilterByType DEFLATE application/javascript text/javascript
        AddOutputFilterByType DEFLATE application/json text/xml application/xml
        AddOutputFilterByType DEFLATE application/x-font-ttf font/opentype
        # Do not compress already-compressed formats
        SetEnvIfNoCase Request_URI \
            \.(?:gif|jpe?g|png|webp|zip|gz|bz2|rar|pdf)$ no-gzip dont-vary
        # Vary header so caches serve the right version
        Header append Vary Accept-Encoding env=!no-gzip
    </IfModule>

    # ── Static asset caching (CSS / JS / fonts / images) ──────────────────
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/css                  "access plus 7 days"
        ExpiresByType application/javascript    "access plus 7 days"
        ExpiresByType image/png                 "access plus 30 days"
        ExpiresByType image/jpeg                "access plus 30 days"
        ExpiresByType image/svg+xml             "access plus 30 days"
        ExpiresByType font/woff2                "access plus 30 days"
    </IfModule>

    # ── Security headers (belt-and-suspenders with .htaccess) ─────────────
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
